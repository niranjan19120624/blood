<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BloodConnect — Emergency Blood Radar</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #080c14;
    overflow: hidden;
    font-family: 'Inter', Arial, sans-serif;
    color: white;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── Background pulse ── */
  .pulse-bg {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, rgba(220,38,38,0.18) 0%, transparent 70%);
    animation: bgPulse 2.8s ease-in-out infinite;
    z-index: 0;
  }
  @keyframes bgPulse {
    0%, 100% { opacity: 0.4; transform: scale(1); }
    50%       { opacity: 1;   transform: scale(1.08); }
  }

  /* ── Particle canvas ── */
  canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

  /* ── Scanline overlay ── */
  .scanlines {
    position: fixed; inset: 0; z-index: 2; pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.07) 2px,
      rgba(0,0,0,0.07) 4px
    );
  }

  /* ── Content ── */
  .content {
    position: relative; z-index: 10;
    text-align: center;
    padding: 40px;
    animation: fadeUp 1.2s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(40px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .eyebrow {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: #ef4444;
    margin-bottom: 18px;
    opacity: 0.9;
  }

  h1 {
    font-size: clamp(2.8rem, 7vw, 5.5rem);
    font-weight: 900;
    line-height: 1.05;
    letter-spacing: -2px;
    background: linear-gradient(135deg, #fff 30%, #fca5a5 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 16px;
  }

  .tagline {
    font-size: 16px;
    font-weight: 300;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.5px;
    margin-bottom: 48px;
    max-width: 360px;
    margin-left: auto;
    margin-right: auto;
    line-height: 1.6;
  }

  /* Heartbeat line */
  .heartbeat-wrap {
    width: 240px;
    height: 40px;
    margin: 0 auto 40px;
    overflow: hidden;
    position: relative;
  }
  .heartbeat-wrap svg {
    width: 100%; height: 100%;
    stroke: #ef4444;
    stroke-width: 2;
    fill: none;
    filter: drop-shadow(0 0 6px #ef4444);
    animation: scrollLine 2s linear infinite;
  }
  @keyframes scrollLine {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }

  /* CTA button */
  .explore-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 18px 52px;
    font-size: 15px;
    font-weight: 700;
    color: white;
    background: #dc2626;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: all 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 0 30px rgba(220,38,38,0.55), 0 0 60px rgba(220,38,38,0.25);
    position: relative;
    overflow: hidden;
  }
  .explore-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
    border-radius: 50px;
  }
  .explore-btn:hover {
    transform: scale(1.07) translateY(-4px);
    box-shadow: 0 0 50px rgba(220,38,38,0.9), 0 0 100px rgba(220,38,38,0.5);
  }
  .explore-btn:active { transform: scale(0.96); }

  /* Stats strip */
  .stats {
    margin-top: 56px;
    display: flex;
    gap: 40px;
    justify-content: center;
    opacity: 0;
    animation: fadeUp 1s 0.6s both;
  }
  .stat { text-align: center; }
  .stat-num {
    font-size: 26px;
    font-weight: 900;
    color: #ef4444;
    display: block;
    font-variant-numeric: tabular-nums;
  }
  .stat-label { font-size: 11px; color: rgba(255,255,255,0.35); letter-spacing: 1px; text-transform: uppercase; margin-top: 4px; }
  .stat-div { width: 1px; background: rgba(255,255,255,0.1); }
</style>
</head>
<body>

<div class="pulse-bg"></div>
<canvas id="canvas"></canvas>
<div class="scanlines"></div>

<div class="content">
  <p class="eyebrow">Emergency Response Network</p>
  <h1>🩸 BloodConnect</h1>
  <p class="tagline">Real-time geolocation radar that connects critical patients with matching donors — instantly.</p>

  <!-- Heartbeat SVG line (looping ECG path) -->
  <div class="heartbeat-wrap">
    <svg viewBox="0 0 480 40" preserveAspectRatio="none">
      <polyline points="
        0,20 40,20 50,20 60,4 70,36 80,20 90,20
        130,20 140,20 150,4 160,36 170,20 180,20
        220,20 230,20 240,4 250,36 260,20 270,20
        310,20 320,20 330,4 340,36 350,20 360,20
        400,20 410,20 420,4 430,36 440,20 480,20
      "/>
    </svg>
  </div>

  <button class="explore-btn" onclick="location.href='/dashboard'">
    <span>Launch Radar</span>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
  </button>

  <div class="stats">
    <div class="stat">
      <span class="stat-num" id="c-donors">0</span>
      <div class="stat-label">Donors Active</div>
    </div>
    <div class="stat-div"></div>
    <div class="stat">
      <span class="stat-num">8</span>
      <div class="stat-label">Blood Types</div>
    </div>
    <div class="stat-div"></div>
    <div class="stat">
      <span class="stat-num">&lt; 60s</span>
      <div class="stat-label">Alert Delivery</div>
    </div>
  </div>
</div>

<script>
  // ── Floating blood cell particles ──
  const canvas = document.getElementById("canvas");
  const ctx    = canvas.getContext("2d");

  function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
  resize();
  window.addEventListener('resize', resize);

  const cells = Array.from({ length: 70 }, () => ({
    x: Math.random() * innerWidth,
    y: Math.random() * innerHeight,
    r: Math.random() * 12 + 5,
    vx: (Math.random() - 0.5) * 0.4,
    vy: -(Math.random() * 0.5 + 0.2),
    alpha: Math.random() * 0.5 + 0.15,
  }));

  function drawCell(c) {
    ctx.save();
    ctx.globalAlpha = c.alpha;
    ctx.beginPath();
    ctx.arc(c.x, c.y, c.r, 0, Math.PI * 2);
    ctx.fillStyle = '#ef4444';
    ctx.fill();
    // bright inner highlight
    ctx.beginPath();
    ctx.arc(c.x - c.r * 0.2, c.y - c.r * 0.2, c.r * 0.45, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,180,180,0.6)';
    ctx.fill();
    ctx.restore();
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    cells.forEach(c => {
      drawCell(c);
      c.x += c.vx;
      c.y += c.vy;
      if (c.y < -20) { c.y = canvas.height + 20; c.x = Math.random() * canvas.width; }
      if (c.x < -20 || c.x > canvas.width + 20) { c.x = Math.random() * canvas.width; }
    });
    requestAnimationFrame(animate);
  }
  animate();

  // ── Live donor count from API ──
  fetch('/api/all_donors')
    .then(r => r.json())
    .then(donors => {
      const el = document.getElementById('c-donors');
      let n = 0;
      const target = donors.length;
      const step = Math.max(1, Math.ceil(target / 40));
      const interval = setInterval(() => {
        n = Math.min(n + step, target);
        el.textContent = n;
        if (n >= target) clearInterval(interval);
      }, 40);
    })
    .catch(() => {}); // silently ignore if API not ready
</script>
</body>
</html>
